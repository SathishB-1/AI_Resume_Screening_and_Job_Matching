<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Job Matcher</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>

<style>
.progress-gradient {
  background: linear-gradient(90deg, #06B6D4 0%, #3B82F6 100%);
}
</style>

</head>

<body class="font-display bg-gray-50 min-h-screen">

<div class="max-w-5xl mx-auto px-6 py-12">

<header class="text-center mb-12">
<h1 class="text-4xl font-extrabold mb-4">
AI Resume Screening & <span class="text-blue-500">Job Matching</span>
</h1>
<p class="text-gray-500">
Match your resume with real job listings using NLP & Semantic Similarity.
</p>
</header>

<!-- Resume Form -->
<section class="mb-16">
<form method="POST" enctype="multipart/form-data">
<div class="bg-white rounded-3xl shadow-xl p-6">

<textarea name="resume_text"
class="w-full h-48 p-4 rounded-xl bg-gray-100 focus:ring-2 focus:ring-blue-400"
placeholder="Paste your resume text here..."></textarea>

<div class="mt-4">
<label class="block mb-2 font-medium">Upload Resume (PDF)</label>
<input type="file" name="resume_file" class="block w-full">
</div>

<div class="text-center mt-6">
<button type="submit"
class="px-8 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-full font-bold">
Analyze & Match Jobs
</button>
</div>

</div>
</form>
</section>

<!-- Results Section -->
{% if results %}
<section>
<h2 class="text-2xl font-bold mb-6">
Top Matching Jobs
</h2>

<div class="grid gap-6">

{% for job in results %}
<div class="bg-white border p-6 rounded-2xl shadow hover:shadow-lg transition">

<h3 class="text-xl font-bold text-blue-600">
{{ job.title }}
</h3>

<p class="text-sm text-gray-500 mt-2">
📍 {{ job.location }} |
🏢 {{ job.company }}
</p>

<div class="mt-4">
<div class="flex justify-between text-sm font-semibold">
<span>Match Accuracy</span>
<span class="text-blue-600">{{ job.score }}%</span>
</div>

<div class="w-full h-3 bg-gray-200 rounded-full overflow-hidden">
<div class="h-full progress-gradient"
style="width: {{ job.score }}%"></div>
</div>

</div>

</div>
{% endfor %}

</div>
</section>
{% endif %}

</div>

</body>
</html>
